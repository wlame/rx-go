version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused

  settings:
    revive:
      rules:
        - name: exported
          disabled: false
        - name: var-naming
          disabled: false
        - name: package-comments
          disabled: true
    gosec:
      excludes:
        - G304 # file inclusion via variable — sandbox is in internal/paths.
        - G204 # subprocess with variable — rx invokes rg with user patterns by design.
    misspell:
      locale: US
    govet:
      enable-all: true
      disable:
        - fieldalignment # declaration order is load-bearing for JSON compat.

  exclusions:
    generated: strict
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - gocritic
          - govet

formatters:
  enable:
    - gofmt
    - goimports
